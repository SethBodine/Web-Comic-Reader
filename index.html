<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Web Comic Reader – open CBR, CBZ or CBT files in your browser. Nothing is uploaded." />
    <title>Web Comic Reader</title>

    <!--
      CHANGELOG (index.html) — v2.2.0
      ─────────────────────────────────────────────────────────────────────
      [SCOPE]  No local library, no folder picker, no IndexedDB, no series
               view. This is a pure drag-drop / click-to-open reader.

      [MERGE DHLKeyuser cursor branch]
        - #readerToolbar: paged/scroll mode toggle, prev/next page, chapter
          nav (shown only when opened from a multi-file session), zoom,
          smart-gap toggle, restart button
        - #pagedContainer: single full-width image + hidden lightbox anchors
        - #scrollContainer: continuous vertical webtoon strip
        - #webtoonDock: fixed bottom bar — page counter, chapter nav,
          collapse/expand, auto-hides on scroll-down
        - #nextChapterFloat: floating "Next Chapter →" button

      [FIX]  frame-ancestors removed from <meta> CSP (browser-ignored;
             enforced only in the HTTP _headers file).
      [FIX]  Dropzone vendored locally — CDN served wrong MIME type.
      [FIX]  'unsafe-eval' removed from script-src.
      [FEAT] Drag-drop zone: upload icon, clear labels, large-file warning,
             chunk-progress bar.
      [FEAT] lightGallery 2.7.2 — replaces abandoned 1.4.0.
      [FEAT] JSZip 3.10.1 CDN — replaces bundled 2.x.
    -->

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src  'self' https://cdn.jsdelivr.net;
                   style-src   'self' https://cdn.jsdelivr.net 'unsafe-inline';
                   font-src    'self' https://cdn.jsdelivr.net;
                   img-src     'self' blob: data:;
                   connect-src 'self';
                   base-uri    'self';
                   form-action 'self'" />

    <meta name="theme-color" content="#2563eb" />

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/css/lightgallery-bundle.min.css"
          crossorigin="anonymous" />
    <link rel="stylesheet" href="./assets/js/vendor/dropzone.min.css?v=2.2.2" />
    <link rel="stylesheet" href="./assets/css/styles.css?v=2.2.2" />

    <noscript><p style="text-align:center;padding:40px">JavaScript is required.</p></noscript>
</head>
<body>

    <!-- ── Loading overlay ───────────────────────────────────────────────── -->
    <div class="se-pre-con" role="status" aria-live="polite" aria-label="Loading comic">
        <div class="spinner"></div>
        <div class="progress-text">Reading 0/0 pages</div>
        <!-- Large-file byte-level progress bar -->
        <div class="chunk-progress" id="chunkProgress" style="display:none">
            <div class="chunk-bar-wrap"><div class="chunk-bar" id="chunkBar"></div></div>
            <div class="chunk-label" id="chunkLabel">Loading…</div>
        </div>
    </div>

    <!-- ── Upload panel ──────────────────────────────────────────────────── -->
    <div class="wrap">
        <button class="collapse-btn" id="collapseBtn" aria-label="Minimise upload panel">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <line x1="2" y1="7" x2="12" y2="7"/>
            </svg>
        </button>

        <div id="uploadView">
            <h1>Web Comic Reader</h1>
            <p>Open a comic file to start reading</p>

            <!-- Drag-and-drop / click-to-open zone -->
            <form id="dropzone" class="dropzone" aria-label="Drop a comic file here or click to browse">
                <div class="dz-message" data-dz-message>
                    <svg class="dz-upload-icon" width="44" height="44" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span class="dz-main-text">Drag &amp; drop your comic here</span>
                    <span class="dz-sub-text">or click to browse files</span>
                    <span class="hint">.cbr · .cbz · .cbt &nbsp;|&nbsp; up to 1 GB</span>
                    <div id="fileSizeWarning" class="file-size-warning" style="display:none">
                        ⚠️ Large file — loading may take a moment…
                    </div>
                </div>
            </form>
        </div>

        <footer class="footer-default">
            Afif Zafri 2017 – <span id="currYear"></span>
            <a href="https://github.com/afzafri/Web-Comic-Reader"
               target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"
                     style="vertical-align:middle;margin-left:6px" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17
                             .55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23
                             -.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82
                             .72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89
                             -3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0
                             .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04
                             2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0
                             3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
                             2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
        </footer>
        <div class="footer-collapsed" id="footerCollapsedText">Open another file</div>
    </div>

    <!-- ── Comic reader output ────────────────────────────────────────────
         Structure from DHLKeyuser/Web-Comic-Reader cursor branch.
         Supports: paged mode, webtoon/scroll mode, lightbox, webtoon dock.
    ─────────────────────────────────────────────────────────────────────── -->
    <div id="output">

        <!-- Reader toolbar: mode toggle · page nav · zoom · smart-gap -->
        <div id="readerToolbar" class="reader-toolbar" style="display:none">
            <div class="reader-toolbar-group mode-group">
                <span class="toolbar-label">Mode</span>
                <div class="mode-toggle" role="group" aria-label="Reading mode">
                    <button type="button" class="mode-btn" data-reading-mode="paged"
                            aria-pressed="false">Paged</button>
                    <button type="button" class="mode-btn" data-reading-mode="scroll"
                            aria-pressed="false">Webtoon</button>
                </div>
            </div>
            <div class="reader-toolbar-group nav-group">
                <button type="button" id="prevPageBtn" class="reader-btn"
                        aria-label="Previous page">Prev</button>
                <div id="pageIndicator" class="page-indicator">0 / 0</div>
                <button type="button" id="nextPageBtn" class="reader-btn"
                        aria-label="Next page">Next</button>
            </div>
            <div class="reader-toolbar-group restart-group">
                <button type="button" id="restartChapterBtn" class="reader-btn"
                        aria-label="Restart from page 1">Restart</button>
            </div>
            <div class="reader-toolbar-group zoom-group">
                <button type="button" id="zoomOutBtn" class="reader-btn" aria-label="Zoom out">−</button>
                <span id="zoomLevel" class="zoom-level">100%</span>
                <button type="button" id="zoomInBtn"  class="reader-btn" aria-label="Zoom in">+</button>
            </div>
            <label class="reader-toolbar-group smart-gap-toggle">
                <input type="checkbox" id="smartGapToggle">
                <span>Smart gaps</span>
            </label>
        </div>

        <!-- Comic title / hint line -->
        <div id="readerMeta" class="reader-meta"></div>

        <!-- Paged mode: single full-width image -->
        <div id="pagedContainer" class="paged-container">
            <a id="pagedImageLink" class="paged-image-link" href="#"
               aria-label="Open page in lightbox">
                <img id="pagedImage" class="paged-image" alt="" />
            </a>
            <!-- Hidden anchor pool for lightGallery -->
            <div id="lightboxLinks" class="lightbox-links" aria-hidden="true"></div>
        </div>

        <!-- Webtoon / Scroll mode: continuous vertical strip -->
        <div id="scrollContainer" class="scroll-container" style="display:none"></div>

        <!-- Webtoon dock: fixed bottom bar -->
        <div id="webtoonDock" class="webtoon-dock collapsed" style="display:none">
            <div class="webtoon-dock-handle">
                <div id="dockPageIndicator" class="dock-page-indicator">0 / 0</div>
                <button type="button" id="dockToggleBtn" class="dock-toggle-btn"
                        aria-label="Toggle dock" aria-expanded="false">
                    <svg class="dock-toggle-icon" width="20" height="20" viewBox="0 0 20 20"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="6 12 10 8 14 12"></polyline>
                    </svg>
                </button>
            </div>
            <div id="webtoonDockContent" class="webtoon-dock-content"></div>
        </div>
    </div>

    <!-- ── Scripts ───────────────────────────────────────────────────────── -->
    <script src="./assets/js/uncompress/uncompress.js?v=2.2.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/lightgallery.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/plugins/zoom/lg-zoom.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/plugins/fullscreen/lg-fullscreen.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/plugins/thumbnail/lg-thumbnail.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/plugins/autoplay/lg-autoplay.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/plugins/rotate/lg-rotate.umd.min.js"
            crossorigin="anonymous"></script>
    <script src="./assets/js/vendor/dropzone.min.js?v=2.2.2"></script>
    <script src="./assets/js/script.js?v=2.2.2"></script>
</body>
</html>
